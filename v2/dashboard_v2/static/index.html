<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard v2 (SSE)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:20px}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eee;margin:6px}
  </style>
</head>
<body>
<h1>ESP32 Telemetry (SSE)</h1>
<div id="log"></div>
<script>
const log = document.getElementById('log');
const es = new EventSource('/events');
es.onmessage = (ev)=>{
  const p = document.createElement('div');
  p.className='pill';
  p.textContent = ev.data;
  log.prepend(p);
};
</script>
</body>
</html>
