<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESP32 Telemetry</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:20px}
    .card{border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#eee;margin-right:6px}
    .muted{color:#666}
  </style>
</head>
<body>
  <h1>ESP32 Telemetry</h1>
  <div id="log" class="card"></div>
<script>
async function pull(){
  try{
    const r = await fetch('/api/telemetry');
    const data = await r.json();
    const log = document.getElementById('log');
    for (const item of data){
      const p = document.createElement('div');
      p.className='pill';
      const ts = new Date(item.t*1000).toLocaleTimeString();
      p.textContent = `[${ts}] ${item.raw}`;
      log.prepend(p);
    }
  }catch(e){}
}
setInterval(pull, 1000);
</script>
</body>
</html>
